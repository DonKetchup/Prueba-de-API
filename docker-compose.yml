services:
  app:
    build: .
    container_name: laravel_app
    restart: unless-stopped
    volumes:
      - .:/var/www
      - /var/www/vendor  # evita sobreescribir vendor del contenedor
    depends_on:
      - db
    networks:
      - laravel

  nginx:
    image: nginx:alpine
    container_name: laravel_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - laravel

  db:
    image: mariadb:11
    container_name: laravel_db
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: api
      MARIADB_ROOT_PASSWORD: secret
      MARIADB_USER: laravel
      MARIADB_PASSWORD: secret
    volumes:
      - dbdata:/var/lib/mysql
    ports:
      - "3307:3307"  # 3307 para no chocar si tienes MariaDB local
    networks:
      - laravel

networks:
  laravel:

volumes:
  dbdata: